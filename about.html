<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - BrekkieBoy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .section {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>About Me</h1>

        <div class="section">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="">
        </div>

        <div class="section">
            <label for="bio">Bio:</label>
            <textarea id="bio" name="bio"></textarea>
        </div>

        <div class="section">
            <label for="interests">Interests:</label>
            <textarea id="interests" name="interests"></textarea>
        </div>

        <div class="section">
            <label for="contact">Contact Information:</label>
            <input type="text" id="contact" name="contact" value="">
        </div>

        <div class="section">
            <label for="website">Website/Social Media:</label>
            <input type="text" id="website" name="website" value="">
        </div>
    </div>
</body>
</html>
